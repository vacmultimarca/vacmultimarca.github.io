<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAC Multimarca</title>
<style>
body {
  background-color: #111111;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  color: white;
}

h1 {
  text-align: center;
  margin: 40px 0 10px 0;
  color: #FFD700;
  letter-spacing: 2px;
  font-size: 36px;
}

h2, h3.subtitle {
  text-align: center;
  color: white;
  margin: 5px 0;
}

h3.subtitle { margin-bottom: 40px; }

.productos {
  display: flex;
  flex-direction: column;
  gap: 40px;
  padding: 40px 8%;
}

.producto {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  background: #1a1a1a;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.producto:nth-child(even) { flex-direction: row-reverse; }

.producto img {
  width: 38%;
  max-width: 220px;
  border-radius: 15px;
}

.info { width: 45%; text-align: center; }

button {
  background-color: #FFD700;
  border: none;
  padding: 14px 30px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

footer { text-align: center; margin: 60px 0 120px 0; }

/* BOTONES FLOTANTES - VERSION SEGURA */
.boton-flotante {
  position: fixed;
  bottom: 25px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  box-shadow: 0 6px 15px rgba(0,0,0,0.5);
  text-decoration: none;
}

.boton-whatsapp { background-color: #25D366; right: 20px; }
.boton-mercado { background-color: #009EE3; left: 20px; }

.boton-flotante img {
  width: 60%;
  height: auto;
}

@media (max-width: 768px) {
  .producto { flex-direction: column !important; text-align: center; }
  .producto img, .info { width: 100%; }
  .boton-flotante { width: 50px; height: 50px; bottom: 20px; }
  .boton-whatsapp { right: 15px; }
  .boton-mercado { left: 15px; }
}

.paginacion { text-align: center; margin: 40px 0; }
.paginacion button {
  background-color: #FFD700;
  margin: 0 4px;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
}
.paginacion button.active { background-color: #e6c200; }
</style>
</head>
<body>

<header>
  <h1>VAC MULTIMARCA</h1>
  <h2>Somos fabricantes</h2>
  <h3 class="subtitle">Soluciones en sujeción y amarre</h3>
</header>

<div id="productos-contenedor" class="productos"></div>
<div class="paginacion" id="paginacion"></div>

<footer>
<p>Seguinos en redes</p>
<p>Instagram: <a href="https://instagram.com/vac_multimarca" target="_blank" style="color:#FFD700;">@vac_multimarca</a></p>
<p>TikTok: <a href="https://www.tiktok.com/@vacmultimarca" target="_blank" style="color:#FFD700;">vacmultimarca</a></p>
<p>© 2026 VAC Multimarca</p>
</footer>

<a href="https://wa.me/5491163824585?text=Hola,%20te%20consulto%20desde%20la%20web" target="_blank" class="boton-flotante boton-whatsapp">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<a href="https://www.mercadopago.com.ar" target="_blank" class="boton-flotante boton-mercado">
  <img src="https://vignette.wikia.nocookie.net/logopedia/images/2/22/Mercado_Pago_logo_2019.svg/revision/latest?cb=20190520113110" alt="MP">
</a>

<script>
const productos = [
  { nombre: "ESLINGA", imagen: "eslinga.jpg" },
  { nombre: "TENSOR", imagen: "tensor.jpg" },
  { nombre: "CINTA P40MM ENCHUFE", imagen: "cintap40mmenchufe.jpg" },
  { nombre: "CINTA P25MM 2 TRAMOS ELASTICO", imagen: "cintap25mm2tramoselastico.jpg" },
  { nombre: "CINTA CON GANCHOS", imagen: "cintaconganchos.jpg" },
  { nombre: "RED PULPO", imagen: "redpulpo.jpg" },
  { nombre: "RED PULPO 25x25", imagen: "redpulpo25x25.jpg" },
  { nombre: "RED PULPO 25x25R", imagen: "redpulpo25x25R.jpg" },
  { nombre: "RED PULPO 50x50", imagen: "redpulpo50x50.jpg" },
  { nombre: "ESLINGA PROLONGADOR P50MM", imagen: "eslingaprolongadorp50mm.jpg" },
  { nombre: "CINTA DE AMARRE DE ATRAQUE", imagen: "cintaamarreatraque.jpg" },
  { nombre: "CINTA P25MM ELASTICO X 1 METRO", imagen: "cintap25mmelasticox1metro.jpg" },
  { nombre: "CINTA ESTERNON", imagen: "cintaesternon.jpg" },
  { nombre: "CINTA ZUNCHO", imagen: "cintazuncho.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS", imagen: "zuncho2tramos.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS P40MM ELASTICO", imagen: "zuncho2tramosp40mmelastico.jpg" },
  { nombre: "CINTA DE AMARRE", imagen: "cintaamarre.jpg" },
  { nombre: "ZUNCHO TENSOR", imagen: "zunchotensor.jpg" },
  { nombre: "PROLONGADOR PASE 25", imagen: "prolongadorp25.jpg" },
  { nombre: "CINTA P40MM ENCHUFE-1", imagen: "cintap40mmenchufe-1.jpg" },
  { nombre: "CINTA AMARRE - 1", imagen: "cintaamarre-1.jpg" }
];

const productosPorPagina = 8;
let paginaActual = 1;

function mostrarProductos(pagina) {
  const contenedor = document.getElementById("productos-contenedor");
  if(!contenedor) return;
  contenedor.innerHTML = "";
  const inicio = (pagina - 1) * productosPorPagina;
  const fin = inicio + productosPorPagina;
  const productosPagina = productos.slice(inicio, fin);

  productosPagina.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    div.innerHTML = <img src="${p.imagen}" alt="${p.nombre}"><div class="info"><h3>${p.nombre}</h3><button onclick="consultarProducto('${p.nombre}')">CONSULTAR</button></div>;
    contenedor.appendChild(div);
  });
}

function crearPaginacion() {
  const pagDiv = document.getElementById("paginacion");
  if(!pagDiv) return;
  pagDiv.innerHTML = "";
  const total = Math.ceil(productos.length / productosPorPagina);
  for (let i = 1; i <= total; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    if (i === paginaActual) btn.classList.add("active");
    btn.onclick = () => { paginaActual = i; mostrarProductos(i); crearPaginacion(); window.scrollTo(0,0); };
    pagDiv.appendChild(btn);
  }
}

function consultarProducto(p) { window.open("https://wa.me/5491163824585?text=Consulta por: "+p, "_blank"); }

mostrarProductos(1);
crearPaginacion();
</script>
</body>
</html>
