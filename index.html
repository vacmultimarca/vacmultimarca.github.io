<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAC Multimarca</title>
<style>
body {
  background-color: #111111;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  color: white;
}

h1 {
  text-align: center;
  margin: 40px 0 10px 0;
  color: #FFD700;
  letter-spacing: 2px;
  font-size: 36px;
}

h2 {
  text-align: center;
  font-size: 20px;
  color: white;
  margin: 5px 0;
}
h3.subtitle {
  text-align: center;
  font-size: 18px;
  color: white;
  margin: 5px 0 40px 0;
}

.productos {
  display: flex;
  flex-direction: column;
  gap: 40px;
  padding: 40px 8%;
}

.producto {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  background: #1a1a1a;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.producto:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

.producto:nth-child(even) {
  flex-direction: row-reverse;
}

.producto img {
  width: 38%;
  max-width: 220px;
  border-radius: 15px;
  transition: transform 0.4s ease;
}

.producto:hover img {
  transform: scale(1.05);
}

.info {
  width: 45%;
  text-align: center;
}

button {
  background-color: #FFD700;
  border: none;
  padding: 14px 30px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background-color: #e6c200;
}

footer, .redes {
  text-align: center;
  margin: 60px 0;
}

@media (max-width: 768px) {
  .producto {
    flex-direction: column !important;
    text-align: center;
  }
  .producto img,
  .info {
    width: 100%;
  }
  h1 { font-size: 28px; }
  h2, h3.subtitle { font-size: 16px; }
}

.paginacion {
  text-align: center;
  margin: 40px 0;
}

.paginacion button {
  background-color: #FFD700;
  border: none;
  padding: 10px 16px;
  margin: 0 4px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

.paginacion button:hover { background-color: #e6c200; }
.paginacion button.active { background-color: #e6c200; }

/* BOTÓN SUSCRIBIRSE */
.boton-suscribir {
  display: block;
  margin: 12px auto;
  background-color: transparent;
  border: 2px solid #FFD700;
  color: #FFD700;
  padding: 10px 30px;
  border-radius: 25px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 1px;
  transition: 0.3s ease;
}

.boton-suscribir:hover {
  background-color: #FFD700;
  color: #111111;
}

/* MENSAJE INSTRUCCIÓN */
.mensaje-suscripcion {
  display: none;
  text-align: center;
  color: #FFD700;
  font-size: 14px;
  margin: 8px 20px;
  padding: 10px 20px;
  border: 1px solid #FFD700;
  border-radius: 12px;
  background-color: rgba(255, 215, 0, 0.08);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* BOTONES FLOTANTES REDONDOS */
.boton-flotante {
  position: fixed;
  bottom: 25px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(0,0,0,0.5);
  z-index: 1000;
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.boton-flotante:hover {
  transform: scale(1.12);
  box-shadow: 0 10px 25px rgba(0,0,0,0.7);
}

.boton-whatsapp {
  background-color: #25D366;
  right: 25px;
}

.boton-mercado {
  background-color: #009EE3;
  left: 25px;
  font-family: Arial, sans-serif;
  font-size: 15px;
  font-weight: 900;
  color: white;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<header>
  <h1>VAC MULTIMARCA</h1>

  <!-- BOTÓN SUSCRIBIRSE -->
  <button class="boton-suscribir" onclick="suscribirse()">⭐ SUSCRIBIRME</button>
  <p class="mensaje-suscripcion" id="mensajeSuscripcion">
    📲 ¡Ya casi estás! Para completar tu suscripción<br>
    <strong>enviá el mensaje que te apareció en WhatsApp.</strong><br>
    ¡Gracias por sumarte a VAC Multimarca!
  </p>

  <h2>Somos fabricantes</h2>
  <h3 class="subtitle">Soluciones en sujeción y amarre</h3>
</header>

<div id="productos-contenedor" class="productos"></div>

<div class="paginacion" id="paginacion"></div>

<footer>
<p>Seguinos en redes</p>
<p>Instagram: <a href="https://instagram.com/vac_multimarca" target="_blank">@vac_multimarca</a></p>
<p>TikTok: <a href="https://www.tiktok.com/@vacmultimarca" target="_blank">vacmultimarca</a></p>
<p>© 2026 VAC Multimarca</p>
</footer>

   target="_blank" class="boton-flotante boton-whatsapp" title="Contactar por WhatsApp">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="34" height="34">

  </svg>
</a>

<a href="#"
   target="_blank" class="boton-flotante boton-mercado" title="Pagar con Mercado Pago">

</a>

<script>
const productos = [
  { nombre: "ESLINGA", imagen: "eslinga.jpg" },
  { nombre: "TENSOR", imagen: "tensor.jpg" },
  { nombre: "CINTA P40MM ENCHUFE", imagen: "cintap40mmenchufe.jpg" },
  { nombre: "CINTA P25MM 2 TRAMOS ELASTICO", imagen: "cintap25mm2tramoselastico.jpg" },
  { nombre: "CINTA CON GANCHOS", imagen: "cintaconganchos.jpg" },
  { nombre: "RED PULPO", imagen: "redpulpo.jpg" },
  { nombre: "RED PULPO 25x25", imagen: "redpulpo25x25.jpg" },
  { nombre: "RED PULPO 25x25R", imagen: "redpulpo25x25R.jpg" },
  { nombre: "RED PULPO 50x50", imagen: "redpulpo50x50.jpg" },
  { nombre: "ESLINGA PROLONGADOR P50MM", imagen: "eslingaprolongadorp50mm.jpg" },
  { nombre: "CINTA DE AMARRE DE ATRAQUE", imagen: "cintaamarreatraque.jpg" },
  { nombre: "CINTA P25MM ELASTICO X 1 METRO", imagen: "cintap25mmelasticox1metro.jpg" },
  { nombre: "CINTA ESTERNON", imagen: "cintaesternon.jpg" },
  { nombre: "CINTA ZUNCHO", imagen: "cintazuncho.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS", imagen: "zuncho2tramos.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS P40MM ELASTICO", imagen: "zuncho2tramosp40mmelastico.jpg" },
  { nombre: "CINTA DE AMARRE", imagen: "cintaamarre.jpg" },
  { nombre: "ZUNCHO TENSOR", imagen: "zunchotensor.jpg" },
  { nombre: "PROLONGADOR PASE 25", imagen: "prolongadorp25.jpg" },
  { nombre: "CINTA P40MM ENCHUFE-1", imagen: "cintap40mmenchufe-1.jpg" },
  { nombre: "CINTA AMARRE - 1", imagen: "cintaamarre-1.jpg" },
];

const productosPorPagina = 8;
let paginaActual = 1;
const totalPaginas = Math.ceil(productos.length / productosPorPagina);

function mostrarProductos(pagina) {
  const contenedor = document.getElementById("productos-contenedor");
  contenedor.innerHTML = "";
  const inicio = (pagina - 1) * productosPorPagina;
  const fin = inicio + productosPorPagina;
  const productosPagina = productos.slice(inicio, fin);

  productosPagina.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    div.innerHTML = `
      <img src="${p.imagen}" alt="${p.nombre}">
      <div class="info">
        <h3>${p.nombre}</h3>
        <button onclick="consultarProducto('${p.nombre}')">CONSULTAR</button>
      </div>
    `;
    contenedor.appendChild(div);
  });
}

function crearPaginacion() {
  const pagDiv = document.getElementById("paginacion");
  pagDiv.innerHTML = "";
  for (let i = 1; i <= totalPaginas; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    if (i === paginaActual) btn.classList.add("active");
    btn.addEventListener("click", () => {
      paginaActual = i;
      mostrarProductos(paginaActual);
      crearPaginacion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    pagDiv.appendChild(btn);
  }
}

function consultarProducto(producto){
    let telefono = "5491163824585";
    let mensaje = "Hola, quiero consultar por: " + producto + "%0A%0AEnviado desde la web VAC Multimarca";
    window.open("https://wa.me/" + telefono + "?text=" + mensaje, "_blank");
}

function suscribirse() {
  const btn = document.querySelector(".boton-suscribir");
  const msg = document.getElementById("mensajeSuscripcion");
  btn.style.display = "none";
  msg.style.display = "block";
  let mensaje = "Hola%20VAC%20Multimarca%2C%20quiero%20suscribirme%20para%20recibir%20novedades%20y%20ofertas.";
  window.open("https://wa.me/5491163824585?text=" + mensaje, "_blank");
}

mostrarProductos(paginaActual);
crearPaginacion();
</script>

</body>
</html>
