<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAC Multimarca</title>
<style>
body {
  background-color: #111111;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  color: white;
}

/* TITULO PRINCIPAL */
h1 {
  text-align: center;
  margin: 40px 0 10px 0;
  color: #FFD700;
  letter-spacing: 2px;
  font-size: 36px;
}

/* SUBTITULO */
h2 {
  text-align: center;
  font-size: 20px;
  color: white;
  margin: 5px 0;
}
h3.subtitle {
  text-align: center;
  font-size: 18px;
  color: white;
  margin: 5px 0 40px 0;
}

/* CONTENEDOR PRODUCTOS */
.productos {
  display: flex;
  flex-direction: column;
  gap: 40px;
  padding: 40px 8%;
}

/* TARJETAS ZIGZAG */
.producto {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  background: #1a1a1a;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.producto:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

.producto:nth-child(even) {
  flex-direction: row-reverse;
}

.producto img {
  width: 38%;
  max-width: 220px;
  border-radius: 15px;
  transition: transform 0.4s ease;
}

.producto:hover img {
  transform: scale(1.05);
}

.info {
  width: 45%;
  text-align: center;
}

button {
  background-color: #FFD700;
  border: none;
  padding: 14px 30px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background-color: #e6c200;
}

footer, .redes {
  text-align: center;
  margin: 60px 0;
}

/* =========================================
   BOTONES FLOTANTES - CORRECCIÓN MP
   ========================================= */
.boton-flotante {
  position: fixed;
  bottom: 25px;
  z-index: 9999;
  box-shadow: 0 6px 15px rgba(0,0,0,0.5);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}

.boton-flotante:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(0,0,0,0.7);
}

/* WhatsApp: Sigue siendo un círculo perfecto */
.boton-whatsapp {
  background-color: #25D366;
  right: 25px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
}

.boton-whatsapp img {
  width: 60%;
  height: auto;
}

/* Mercado Pago: Ahora es una "píldora" para que entre el logo entero */
.boton-mercado {
  background-color: #009EE3; /* Celeste oficial */
  left: 25px;
  height: 60px;
  padding: 0 20px; /* Espacio horizontal */
  border-radius: 30px; /* Bordes muy redondeados */
  width: auto; /* Ancho automático según el logo */
}

.boton-mercado img {
  height: 40%; /* Ajustamos la altura del logo dentro de la píldora */
  width: auto;
}

/* VERSION CELULAR (Mobile) */
@media (max-width: 768px) {
  .producto {
    flex-direction: column !important;
    text-align: center;
  }

  .producto img,
  .info {
    width: 100%;
  }

  h1 { font-size: 28px; }
  h2, h3.subtitle { font-size: 16px; }

  /* Achicamos botones en mobile */
  .boton-flotante { bottom: 20px; }
  
  .boton-whatsapp {
    right: 20px;
    width: 50px;
    height: 50px;
  }
  
  .boton-mercado {
    left: 20px;
    height: 50px;
    padding: 0 15px;
  }
}
/* ========================================= */

.paginacion {
  text-align: center;
  margin: 40px 0;
}

.paginacion button {
  background-color: #FFD700;
  border: none;
  padding: 10px 16px;
  margin: 0 4px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

.paginacion button.active {
  background-color: #e6c200;
}
</style>
</head>
<body>

<header>
  <h1>VAC MULTIMARCA</h1>
  <h2>Somos fabricantes</h2>
  <h3 class="subtitle">Soluciones en sujeción y amarre</h3>
</header>

<div id="productos-contenedor" class="productos">
  </div>

<div class="paginacion" id="paginacion">
  </div>

<footer>
<p>Seguinos en redes</p>
<p>
Instagram: <a href="https://instagram.com/vac_multimarca" target="_blank" style="color:#FFD700;">@vac_multimarca</a>
</p>
<p>
TikTok: <a href="https://www.tiktok.com/@vacmultimarca" target="_blank" style="color:#FFD700;">vacmultimarca</a>
</p>
<p>© 2026 VAC Multimarca</p>
</footer>

<a href="https://wa.me/5491163824585?text=Hola,%20te%20consulto%20desde%20la%20web%20VAC%20Multimarca"
   target="_blank" class="boton-flotante boton-whatsapp" title="Escribinos por WhatsApp">
   <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<a href="https://www.mercadopago.com.ar"
   target="_blank" class="boton-flotante boton-mercado" title="Pagá con Mercado Pago">
   <img src="https://http2.mlstatic.com/frontend-assets/mp-web-navigation/ui-navigation/5.21.22/mercadopago/logo__small.png" alt="Mercado Pago">
</a>

<script>
const productos = [
  { nombre: "ESLINGA", imagen: "eslinga.jpg" },
  { nombre: "TENSOR", imagen: "tensor.jpg" },
  { nombre: "CINTA P40MM ENCHUFE", imagen: "cintap40mmenchufe.jpg" },
  { nombre: "CINTA P25MM 2 TRAMOS ELASTICO", imagen: "cintap25mm2tramoselastico.jpg" },
  { nombre: "CINTA CON GANCHOS", imagen: "cintaconganchos.jpg" },
  { nombre: "RED PULPO", imagen: "redpulpo.jpg" },
  { nombre: "RED PULPO 25x25", imagen: "redpulpo25x25.jpg" },
  { nombre: "RED PULPO 25x25R", imagen: "redpulpo25x25R.jpg" },
  { nombre: "RED PULPO 50x50", imagen: "redpulpo50x50.jpg" },
  { nombre: "ESLINGA PROLONGADOR P50MM", imagen: "eslingaprolongadorp50mm.jpg" },
  { nombre: "CINTA DE AMARRE DE ATRAQUE", imagen: "cintaamarreatraque.jpg" },
  { nombre: "CINTA P25MM ELASTICO X 1 METRO", imagen: "cintap25mmelasticox1metro.jpg" },
  { nombre: "CINTA ESTERNON", imagen: "cintaesternon.jpg" },
  { nombre: "CINTA ZUNCHO", imagen: "cintazuncho.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS", imagen: "zuncho2tramos.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS P40MM ELASTICO", imagen: "zuncho2tramosp40mmelastico.jpg" },
  { nombre: "CINTA DE AMARRE", imagen: "cintaamarre.jpg" },
  { nombre: "ZUNCHO TENSOR", imagen: "zunchotensor.jpg" },
  { nombre: "PROLONGADOR PASE 25", imagen: "prolongadorp25.jpg" },
  { nombre: "CINTA P40MM ENCHUFE-1", imagen: "cintap40mmenchufe-1.jpg" },
  { nombre: "CINTA AMARRE - 1", imagen: "cintaamarre-1.jpg" }
];

const productosPorPagina = 8;
let paginaActual = 1;
const totalPaginas = Math.ceil(productos.length / productosPorPagina);

function mostrarProductos(pagina) {
  const contenedor = document.getElementById("productos-contenedor");
  contenedor.innerHTML = "";
  const inicio = (pagina - 1) * productosPorPagina;
  const fin = inicio + productosPorPagina;
  const productosPagina = productos.slice(inicio, fin);

  productosPagina.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    div.innerHTML = `
      <img src="${p.imagen}" alt="${p.nombre}">
      <div class="info">
        <h3>${p.nombre}</h3>
        <button onclick="consultarProducto('${p.nombre}')">CONSULTAR</button>
      </div>
    `;
    contenedor.appendChild(div);
  });
}

function crearPaginacion() {
  const pagDiv = document.getElementById("paginacion");
  pagDiv.innerHTML = "";

  for (let i = 1; i <= totalPaginas; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    if (i === paginaActual) btn.classList.add("active");
    btn.addEventListener("click", () => {
      paginaActual = i;
      mostrarProductos(paginaActual);
      crearPaginacion();
      window.scrollTo(0,0);
    });
    pagDiv.appendChild(btn);
  }
}

function consultarProducto(producto){
    let telefono = "5491163824585"; 
    let mensaje = "Hola, quiero consultar por: " + producto + "%0A%0AEnviado desde la web VAC Multimarca";
    window.open("https://wa.me/" + telefono + "?text=" + mensaje, "_blank");
}

mostrarProductos(paginaActual);
crearPaginacion();
</script>

</body>
</html>
