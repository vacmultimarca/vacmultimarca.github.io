<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAC Multimarca</title>

<style>
body {
  background-color: #111111;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  color: white;
}

/* TITULO PRINCIPAL */
h1 {
  text-align: center;
  margin: 50px 0 10px 0;
  color: #FFD700;
  letter-spacing: 2px;
  font-size: 50px;
}

/* SUBTITULO */
h2, p {
  text-align: center;
  margin: 5px 0;
}

#subtitulo-fabricantes {
  font-size: 20px;
  color: white;
}

#subtitulo-sujecion {
  font-size: 18px;
  color: white;
}

/* CONTENEDOR PRODUCTOS */
.productos {
  display: flex;
  flex-direction: column;
  gap: 40px;
  padding: 40px 8%;
}

/* TARJETAS ZIGZAG */
.producto {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  background: #1a1a1a;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

/* EFECTO SALIR HACIA AFUERA */
.producto:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

/* ZIGZAG */
.producto:nth-child(even) {
  flex-direction: row-reverse;
}

/* IMAGEN */
.producto img {
  width: 40%;
  max-width: 220px;
  border-radius: 15px;
  transition: transform 0.4s ease;
}

.producto:hover img {
  transform: scale(1.05);
}

/* INFO */
.info {
  width: 45%;
  text-align: center;
}

/* BOTON */
button {
  background-color: #FFD700;
  border: none;
  padding: 14px 30px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background-color: #e6c200;
}

/* REDES / FOOTER CENTRADO */
footer, .redes {
  text-align: center;
  margin: 60px 0;
}

/* VERSION CELULAR */
@media (max-width: 768px) {
  .producto {
    flex-direction: column !important;
    text-align: center;
  }

  .producto img,
  .info {
    width: 100%;
  }
}

/* PAGINACIÓN */
.paginacion {
  text-align: center;
  margin: 40px 0;
}

.paginacion button {
  background-color: #FFD700;
  border: none;
  padding: 10px 16px;
  margin: 0 4px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

.paginacion button:hover {
  background-color: #e6c200;
}

.paginacion button.active {
  background-color: #e6c200;
}

/* BOTONES FLOTANTES */
.flotante {
  position: fixed;
  bottom: 25px;
  height: 65px;
  border-radius: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  z-index: 1000;
  font-weight: bold;
  font-family: Arial, sans-serif;
  color: white;
  cursor: pointer;
  transition: 0.3s ease;
}

.flotante:hover {
  filter: brightness(1.1);
}

#whatsapp {
  right: 25px;
  background: #25D366;
}

#mercadopago {
  left: 25px;
  background: #003087; /* Azul oficial de Mercado Pago */
}
</style>
</head>

<body>

<header>
  <h1>VAC MULTIMARCA</h1>
  <p id="subtitulo-fabricantes">Somos fabricantes</p>
  <p id="subtitulo-sujecion">Soluciones en sujeción y amarre</p>
</header>

<div id="productos-contenedor" class="productos">
  <!-- Productos se generan automáticamente aquí -->
</div>

<div class="paginacion" id="paginacion">
  <!-- Botones de página se generan automáticamente aquí -->
</div>

<footer>
  <p>Seguinos en redes</p>

  <p>
    Instagram:
    <a href="https://instagram.com/vac_multimarca" target="_blank">
      @vac_multimarca
    </a>
  </p>

  <p>
    TikTok:
    <a href="https://www.tiktok.com/@vacmultimarca" target="_blank">
      vacmultimarca
    </a>
  </p>

  <p>© 2026 VAC Multimarca</p>
</footer>

<!-- BOTONES FLOTANTES -->
<a id="whatsapp" href="https://wa.me/5491163824585?text=Hola,%20te%20consulto%20desde%20la%20web%20VAC%20Multimarca" target="_blank" class="flotante">
  WhatsApp
</a>

<a id="mercadopago" href="#" target="_blank" class="flotante">
  Mercado Pago
</a>

<script>
// LISTA DE PRODUCTOS
const productos = [
  { nombre: "ESLINGA", imagen: "eslinga.jpg" },
  { nombre: "TENSOR", imagen: "tensor.jpg" },
  { nombre: "CINTA P40MM ENCHUFE", imagen: "cintap40mmenchufe.jpg" },
  { nombre: "CINTA P25MM 2 TRAMOS ELASTICO", imagen: "cintap25mm2tramoselastico.jpg" },
  { nombre: "CINTA CON GANCHOS", imagen: "cintaconganchos.jpg" },
  { nombre: "RED PULPO", imagen: "redpulpo.jpg" },
  { nombre: "RED PULPO 25x25", imagen: "redpulpo25x25.jpg" },
  { nombre: "RED PULPO 25x25R", imagen: "redpulpo25x25R.jpg" },
  { nombre: "RED PULPO 50x50", imagen: "redpulpo50x50.jpg" },
  { nombre: "ESLINGA PROLONGADOR P50MM", imagen: "eslingaprolongadorp50mm.jpg" },
  { nombre: "CINTA DE AMARRE DE ATRAQUE", imagen: "cintaamarreatraque.jpg" },
  { nombre: "CINTA P25MM ELASTICO X 1 METRO", imagen: "cintap25mmelasticox1metro.jpg" },
  { nombre: "CINTA ESTERNON", imagen: "cintaesternon.jpg" },
  { nombre: "CINTA ZUNCHO", imagen: "cintazuncho.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS", imagen: "zuncho2tramos.jpg" },
  { nombre: "ZUNCHO 2 TRAMOS P40MM ELASTICO", imagen: "zuncho2tramosp40mmelastico.jpg" },
  { nombre: "CINTA DE AMARRE", imagen: "cintaamarre.jpg" },
  { nombre: "ZUNCHO TENSOR", imagen: "zunchotensor.jpg" },
  { nombre: "PROLONGADOR PASE 25", imagen: "prolongadorp25.jpg" },
  { nombre: "CINTA P40MM ENCHUFE-1", imagen: "cintap40mmenchufe-1.jpg" },
  { nombre: "CINTA AMARRE - 1", imagen: "cintaamarre-1.jpg" },
  // Podes seguir agregando productos sin límite
];

// CONFIGURACIÓN DE PAGINACIÓN
const productosPorPagina = 8;
let paginaActual = 1;
const totalPaginas = Math.ceil(productos.length / productosPorPagina);

function mostrarProductos(pagina) {
  const contenedor = document.getElementById("productos-contenedor");
  contenedor.innerHTML = "";
  const inicio = (pagina - 1) * productosPorPagina;
  const fin = inicio + productosPorPagina;
  const productosPagina = productos.slice(inicio, fin);

  productosPagina.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    div.innerHTML = `
      <img src="${p.imagen}" alt="${p.nombre}">
      <div class="info">
        <h3>${p.nombre}</h3>
        <button onclick="consultarProducto('${p.nombre}')">CONSULTAR</button>
      </div>
    `;
    contenedor.appendChild(div);
  });
}

function crearPaginacion() {
  const pagDiv = document.getElementById("paginacion");
  pagDiv.innerHTML = "";

  for (let i = 1; i <= totalPaginas; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    if (i === paginaActual) btn.classList.add("active");
    btn.addEventListener("click", () => {
      paginaActual = i;
      mostrarProductos(paginaActual);
      crearPaginacion();
    });
    pagDiv.appendChild(btn);
  }
}

// FUNCION WHATSAPP
function consultarProducto(producto){
    let telefono = "5491163824585"; 
    let mensaje = "Hola, quiero consultar por: " + producto + "%0A%0AEnviado desde la web VAC Multimarca";
    window.open("https://wa.me/" + telefono + "?text=" + mensaje, "_blank");
}

// MOSTRAR INICIAL
mostrarProductos(paginaActual);
crearPaginacion();
</script>

</body>
</html>
